name: Fetch Service Status

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # permite correrlo a mano desde GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all statuspages
        run: node scripts/fetch.js

      - name: Commit & push status.json
        run: |
          git config user.name  "statuswatch-bot"
          git config user.email "bot@statuswatch"
          git add docs/status.json
          # Solo commitea si hubo cambios
          git diff --cached --quiet || git commit -m "chore: update status $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push
